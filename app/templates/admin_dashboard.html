{% extends "base.html" %}
{% block title %}Admin{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Panel administratora</h1>
<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="bg-white p-4 rounded shadow text-center"><p class="text-3xl font-bold">{{ users_count }}</p><p class="text-sm text-gray-500">Użytkownicy</p></div>
  <div class="bg-white p-4 rounded shadow text-center"><p class="text-3xl font-bold">{{ audits_count }}</p><p class="text-sm text-gray-500">Audyty</p></div>
  <div class="bg-white p-4 rounded shadow text-center"><p class="text-3xl font-bold">{{ logs_count }}</p><p class="text-sm text-gray-500">Wpisy w logu</p></div>
</div>
<div class="flex gap-3">
  <a href="/admin/users" class="bg-purple-600 text-white px-4 py-2 rounded">Użytkownicy</a>
  <a href="/admin/audit-log" class="bg-purple-600 text-white px-4 py-2 rounded">Audit log</a>
</div>
{% endblock %}
