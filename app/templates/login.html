{% extends "base.html" %}
{% block title %}Logowanie{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-xl font-bold mb-4">Logowanie</h1>
  <div id="form-error" class="text-red-600 text-sm mb-2"></div>
  <form hx-post="/auth/login" hx-swap="none"
        hx-on::after-request="if(event.detail.failed) document.getElementById('form-error').textContent='Nieprawidłowy email lub hasło'">
    <label class="block mb-3"><span class="text-sm">Email</span>
      <input type="email" name="email" required class="w-full border rounded px-2 py-1">
    </label>
    <label class="block mb-4"><span class="text-sm">Hasło</span>
      <input type="password" name="password" required class="w-full border rounded px-2 py-1">
    </label>
    <button class="bg-blue-600 text-white px-4 py-2 rounded w-full">Zaloguj</button>
  </form>
  <p class="text-sm mt-3">Nie masz konta? <a href="/register" class="text-blue-600">Zarejestruj się</a></p>
</div>
{% endblock %}
