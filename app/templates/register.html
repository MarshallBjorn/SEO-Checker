{% extends "base.html" %}
{% block title %}Rejestracja{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h1 class="text-xl font-bold mb-4">Rejestracja</h1>
  <div id="form-error" class="text-red-600 text-sm mb-2"></div>
  <form hx-post="/auth/register" hx-swap="none"
        hx-on::after-request="if(event.detail.failed) document.getElementById('form-error').textContent='Rejestracja nieudana (email zajęty lub hasło < 8 znaków)'">
    <label class="block mb-3"><span class="text-sm">Email</span>
      <input type="email" name="email" required class="w-full border rounded px-2 py-1">
    </label>
    <label class="block mb-4"><span class="text-sm">Hasło (min. 8 znaków)</span>
      <input type="password" name="password" required minlength="8" class="w-full border rounded px-2 py-1">
    </label>
    <button class="bg-blue-600 text-white px-4 py-2 rounded w-full">Zarejestruj</button>
  </form>
  <p class="text-sm mt-3">Masz konto? <a href="/login" class="text-blue-600">Zaloguj się</a></p>
</div>
{% endblock %}
