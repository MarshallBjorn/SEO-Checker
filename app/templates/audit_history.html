{% extends "base.html" %}
{% block title %}Historia{% endblock %}
{% block content %}
<div class="flex items-center mb-4 gap-3">
  <h1 class="text-2xl font-bold">Historia audytów</h1>
  <a href="/audit/new" class="ml-auto bg-blue-600 text-white px-3 py-1 rounded text-sm">Nowy</a>
</div>
<form action="/compare" method="get" class="bg-white p-4 rounded shadow mb-4 text-sm">
  <p class="font-medium mb-2">Porównaj dwa audyty</p>
  <div class="flex gap-2 items-end flex-wrap">
    <label>Audyt A
      <select name="a" class="border rounded px-1 py-1 block">
        {% for audit in audits %}<option value="{{ audit.id }}">{{ audit.url }} ({{ audit.created_at.strftime('%m-%d %H:%M') }})</option>{% endfor %}
      </select>
    </label>
    <label>Audyt B
      <select name="b" class="border rounded px-1 py-1 block">
        {% for audit in audits %}<option value="{{ audit.id }}">{{ audit.url }} ({{ audit.created_at.strftime('%m-%d %H:%M') }})</option>{% endfor %}
      </select>
    </label>
    <button class="bg-gray-700 text-white px-3 py-1 rounded">Porównaj</button>
  </div>
</form>
<div class="bg-white p-4 rounded shadow">
  <table class="w-full text-sm">
    <thead><tr class="text-left border-b"><th class="py-1">URL</th><th>Status</th><th>Data</th><th></th></tr></thead>
    <tbody>
      {% for audit in audits %}{% include "partials/audit_row.html" %}{% else %}
      <tr><td colspan="4" class="py-2 text-gray-500">Brak audytów</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
